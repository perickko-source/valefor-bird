<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

  display: flex;
  flex-direction: column;

}
#game-container {

  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}
#game-canvas {
  border: 3px solid #ffffff;
  border-radius: 10px;

#score-display {

  left: 50%;

  font-weight: bold;

}
#lives-display {

#encouragement-message {

  text-align: center;
  animation: none;
}
#encouragement-message.show { animation: encouragementPop 1.5s ease-out forwards; }
@keyframes encouragementPop {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  40% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
}

#controls {

  justify-content: center;

}
.control-btn {

  border-radius: 25px;

  font-weight: bold;

.control-btn:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }

.control-btn.secondary { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; }
.control-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.menu-subtitle {

.menu-stats {

.mode-omega { background: linear-gradient(135deg, #fa709a, #fee140) !important; box-shadow: 0 3px 15px rgba(250,112,154,0.8) !important; animation: pulse 0.5s ease-in-out infinite !important; }

.radio-container {

  z-index: 150;

#radio-btn {

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

#sound-btn {

  right: 15px;

  height: 50px;

#leaderboard-screen {

.leaderboard-content {

.leaderboard-title {

.leaderboard-item {

.leaderboard-item.top-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); }
.leaderboard-item.top-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); }

.leaderboard-empty {

.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 60;

@keyframes particleFly {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}
.damage-flash { animation: damageFlash 0.3s ease-out; }
@keyframes damageFlash {
  0%, 100% { filter: none; }
  50% { filter: sepia(1) hue-rotate(-50deg) saturate(3); }
}
@media (max-width: 350px) {
  #game-canvas { width: 320px; height: 480px; }

<script>
// ✅ INICIALIZACIÓN COMPATIBLE CON INLINE + WEB APP
const tg = window.Telegram?.WebApp || null;

function initTelegram() {
  if (!tg) return;
  tg.ready();
  
  const isInlineGame = window.location.href.includes('?game=');
  
  if (isInlineGame) {
    document.body.style.overflow = 'auto';
    document.body.style.height = 'auto';
    document.documentElement.style.overflow = 'auto';
    if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
  } else {
    if (tg.expand) tg.expand();
  }
  
  if (tg.setHeaderColor) tg.setHeaderColor('#667eea');
  if (tg.setBackgroundColor) tg.setBackgroundColor('#764ba2');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initTelegram);
} else {
  initTelegram();
}
</script>

<script>
// 📻 VARIABLES DE RADIO
const radioAudio = document.getElementById('radio-audio');
const radioBtn = document.getElementById('radio-btn');
let radioEnabled = false, radioLoading = false;

// 🎮 VARIABLES DEL JUEGO
let playerName = '', gameRunning = false, soundEnabled = true, audioContext = null;
let score = 0, bestScore = 0, lives = 3, MAX_LIVES = 3;

const BIRD_SIZE = 100, BIRD_X = 50;
let birdY = 300, birdVelocity = 0;
const GRAVITY = 0.3, JUMP_STRENGTH = -7;
let birdFrame = 0, birdFrameCount = 0;

const birdImage = new Image();
birdImage.src = 'pajarito.png';
let birdImageLoaded = false;
birdImage.onload = () => { birdImageLoaded = true; };

let pipes = [];
const PIPE_WIDTH = 60, PIPE_GAP = 250;
let PIPE_SPEED = 2;
const BASE_PIPE_SPEED = 2;
let pipeTimer = 0;
const PIPE_SPAWN_INTERVAL = 150;

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('score-display');
const livesDisplay = document.getElementById('lives-display');
const encouragementMessage = document.getElementById('encouragement-message');
const menuScreen = document.getElementById('menu-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const finalScoreEl = document.getElementById('final-score');
const bestScoreFinalEl = document.getElementById('best-score-final');
const bestScoreEl = document.getElementById('best-score');
const leaderboardScreen = document.getElementById('leaderboard-screen');
const leaderboardList = document.getElementById('leaderboard-list');
const leaderboardEmpty = document.getElementById('leaderboard-empty');
const difficultyBadge = document.getElementById('difficulty-badge');

const encouragementMessages = [
  '¡Vamos! 💪', '¡Tú puedes! ⭐', '¡Asombroso! 🌟', '¡Espetacular! 🎉',
  '¡Whola! 😄', '¡Extraordinario! 🏆', '¡Increíble! 🚀', '¡Genial! 😎',
  '¡Sigue así! 💫', '¡Eres crack! 👑', '¡Imparable! 🔥', '¡Fantástico! ✨',
  '¡Brutal! 💥', '¡Maestro! 🎯', '¡Legendario! 🌈'
];

const milestoneMessages = {
  5: '¡5 Puntos! 🎯', 10: '¡10 Puntos! 🎉', 15: '¡15 Puntos! ⭐',
  20: '¡20 Puntos! 🌟', 25: '¡25 Puntos! 🔥', 30: '¡30 Puntos! 👑',
  35: '¡35 Puntos! 💎', 40: '¡40 Puntos! 🏆', 45: '¡45 Puntos! 🚀',
  50: '¡50 Puntos! 🌈', 60: '¡60 Puntos! 💫', 70: '¡70 Puntos! ⚡',
  80: '¡80 Puntos! 🎯', 90: '¡90 Puntos! 🎪', 100: '¡100 Puntos! 🏅'
};

// 🏆 TABLA DE MODOS DE DIFICULTAD
const difficultyModes = [
  { minScore: 0, name: '✨ Modo Fácil', class: 'mode-facil', speedMult: 1.0 },
  { minScore: 50, name: '🔥 Modo Experto', class: 'mode-experto', speedMult: 1.1 },
  { minScore: 100, name: '💀 Modo Puto Amo', class: 'mode-puto-amo', speedMult: 1.2 },
  { minScore: 150, name: '👑 Modo Leyenda', class: 'mode-leyenda', speedMult: 1.3 },
  { minScore: 200, name: '⚡ Modo Dios', class: 'mode-dios', speedMult: 1.4 },
  { minScore: 250, name: '🌋 Modo Titán', class: 'mode-titan', speedMult: 1.5 },
  { minScore: 300, name: '☢️ Modo Omega', class: 'mode-omega', speedMult: 1.6 },
  { minScore: 350, name: '💀 Modo Inmortal', class: 'mode-inmortal', speedMult: 1.7 },
  { minScore: 400, name: '♾️ Modo Eterno', class: 'mode-eterno', speedMult: 1.8 },
  { minScore: 450, name: '👁️ Modo Supremo', class: 'mode-supremo', speedMult: 1.9 },
  { minScore: 500, name: '🌟 Modo Divino', class: 'mode-divino', speedMult: 2.0 }
];

function initPlayerName() {
  if (tg?.initDataUnsafe?.user) {
    const u = tg.initDataUnsafe.user;
    playerName = u.username ? '@'+u.username : (u.first_name || 'Piloto');
  } else {
    playerName = localStorage.getItem('flappy_player_name') || 'Piloto';
  }
}

function toggleRadio() {
  if (radioLoading) return;
  radioEnabled = !radioEnabled;
  if (radioEnabled) {
    radioLoading = true; radioBtn.classList.add('loading');
    radioAudio.pause(); radioAudio.currentTime = 0;
    radioAudio.play().then(() => {
      radioLoading = false; radioBtn.classList.remove('loading'); radioBtn.classList.add('playing');
    }).catch(() => {
      radioEnabled = false; radioLoading = false; radioBtn.classList.remove('loading');
      if (tg?.showAlert) tg.showAlert('❌ No se pudo conectar a la radio.');
      else alert('❌ No se pudo conectar a la radio.');
    });
  } else {
    radioAudio.pause(); radioBtn.classList.remove('playing', 'loading');
  }
}

function initAudio() { if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)(); }

function playSound(type) {
  if (!soundEnabled || !audioContext) return;
  const osc = audioContext.createOscillator(), gain = audioContext.createGain();
  osc.connect(gain); gain.connect(audioContext.destination);
  if (type === 'jump') {
    osc.frequency.value = 400; osc.type = 'sine';
    gain.gain.setValueAtTime(0.2, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
    osc.start(); osc.stop(audioContext.currentTime + 0.15);
  } else if (type === 'score') {
    osc.frequency.value = 800; osc.type = 'sine';
    gain.gain.setValueAtTime(0.15, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
    osc.start(); osc.stop(audioContext.currentTime + 0.1);
  } else if (type === 'damage') {
    osc.frequency.value = 250; osc.type = 'sawtooth';
    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
    osc.start(); osc.stop(audioContext.currentTime + 0.3);
  } else if (type === 'gameover') {
    osc.frequency.value = 200; osc.type = 'sawtooth';
    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
    osc.start(); osc.stop(audioContext.currentTime + 0.5);
  } else if (type === 'encouragement') {
    osc.frequency.value = 700; osc.type = 'sine';
    gain.gain.setValueAtTime(0.2, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
    osc.start(); osc.stop(audioContext.currentTime + 0.2);
  } else if (type === 'levelup') {
    osc.frequency.value = 1000; osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
    osc.start(); osc.stop(audioContext.currentTime + 0.4);
  }
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('sound-btn').innerText = soundEnabled ? '🔊' : '🔇';
}

function showEncouragement(isMilestone = false, milestoneScore = 0) {
  let message = '';
  if (isMilestone && milestoneMessages[milestoneScore]) {
    message = milestoneMessages[milestoneScore];
  } else {
    message = encouragementMessages[Math.floor(Math.random() * encouragementMessages.length)];
  }
  encouragementMessage.innerText = message;
  encouragementMessage.classList.remove('show');
  void encouragementMessage.offsetWidth;
  encouragementMessage.classList.add('show');
  playSound('encouragement');
  if (isMilestone && milestoneScore % 10 === 0) {
    createParticles(canvas.width/2, canvas.height/2, '#ffdd59');
  }
}

// 🏆 ACTUALIZAR MODO DE DIFICULTAD
function updateDifficultyMode() {
  let currentMode = difficultyModes[0];
  
  for (let i = difficultyModes.length - 1; i >= 0; i--) {
    if (score >= difficultyModes[i].minScore) {
      currentMode = difficultyModes[i];
      break;
    }
  }
  
  // Actualizar badge
  difficultyBadge.className = 'easy-mode-badge ' + currentMode.class;
  difficultyBadge.innerText = currentMode.name;
  
  // Actualizar velocidad
  PIPE_SPEED = BASE_PIPE_SPEED * currentMode.speedMult;
  
  return currentMode;
}

function drawBird() {
  birdFrameCount++;
  if (birdFrameCount % 10 === 0) { birdFrame = (birdFrame + 1) % 3; }
  const rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, birdVelocity * 0.05));
  ctx.save();
  ctx.translate(BIRD_X + BIRD_SIZE/2, birdY + BIRD_SIZE/2);
  ctx.rotate(rotation);
  if (birdImageLoaded) {
    ctx.drawImage(birdImage, -BIRD_SIZE/2, -BIRD_SIZE/2, BIRD_SIZE, BIRD_SIZE);
  } else {
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.ellipse(0, 0, BIRD_SIZE/2, BIRD_SIZE/2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(BIRD_SIZE/4, -BIRD_SIZE/6, BIRD_SIZE/6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'black';
    ctx.beginPath();
    ctx.arc(BIRD_SIZE/3, -BIRD_SIZE/6, BIRD_SIZE/12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FF6B6B';
    ctx.beginPath();
    ctx.moveTo(BIRD_SIZE/3, 0);
    ctx.lineTo(BIRD_SIZE/2 + 10, BIRD_SIZE/8);
    ctx.lineTo(BIRD_SIZE/3, BIRD_SIZE/4);
    ctx.fill();
  }
  ctx.restore();
}

function drawPipes() {
  pipes.forEach(pipe => {
    ctx.fillStyle = '#73BF2E';
    ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
    ctx.strokeStyle = '#2D5A1E';
    ctx.lineWidth = 4;
    ctx.strokeRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
    ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, PIPE_WIDTH + 10, 30);
    ctx.strokeRect(pipe.x - 5, pipe.topHeight - 30, PIPE_WIDTH + 10, 30);
    const bottomY = pipe.topHeight + PIPE_GAP;
    ctx.fillRect(pipe.x, bottomY, PIPE_WIDTH, canvas.height - bottomY);
    ctx.strokeRect(pipe.x, bottomY, PIPE_WIDTH, canvas.height - bottomY);
    ctx.fillRect(pipe.x - 5, bottomY, PIPE_WIDTH + 10, 30);
    ctx.strokeRect(pipe.x - 5, bottomY, PIPE_WIDTH + 10, 30);
  });
}

function drawBackground() {
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, '#70C5CE');
  gradient.addColorStop(1, '#B8E8EE');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(100, 100, 30, 0, Math.PI * 2);
  ctx.arc(140, 100, 40, 0, Math.PI * 2);
  ctx.arc(180, 100, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(300, 150, 25, 0, Math.PI * 2);
  ctx.arc(330, 150, 35, 0, Math.PI * 2);
  ctx.arc(360, 150, 25, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#DED895';
  ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
  ctx.fillStyle = '#73BF2E';
  ctx.fillRect(0, canvas.height - 50, canvas.width, 10);
}

function updateBird() {
  birdVelocity += GRAVITY;
  birdY += birdVelocity;
  if (birdY < 0) { birdY = 0; birdVelocity = 0; }
  if (birdY + BIRD_SIZE - 20 > canvas.height - 50) { loseLife(); }
}

function updatePipes() {
  pipeTimer++;
  if (pipeTimer > PIPE_SPAWN_INTERVAL) {
    const minPipeHeight = 80;
    const maxPipeHeight = canvas.height - PIPE_GAP - minPipeHeight - 50;
    const topHeight = Math.random() * (maxPipeHeight - minPipeHeight) + minPipeHeight;
    pipes.push({ x: canvas.width, topHeight: topHeight, passed: false });
    pipeTimer = 0;
  }
  pipes.forEach(pipe => {
    pipe.x -= PIPE_SPEED;
    if (!pipe.passed && pipe.x + PIPE_WIDTH < BIRD_X) {
      score++;
      pipe.passed = true;
      scoreDisplay.innerText = score;
      playSound('score');
      createParticles(BIRD_X + BIRD_SIZE/2, birdY + BIRD_SIZE/2, '#FFD700');
      
      // Verificar cambio de modo de dificultad
      const newMode = updateDifficultyMode();
      
      // Mostrar mensaje si cambió el modo (cada 50 puntos)
      if (score > 0 && score % 50 === 0) {
        encouragementMessage.innerText = '⚡ ¡' + newMode.name + '! ⚡';
        encouragementMessage.classList.remove('show');
        void encouragementMessage.offsetWidth;
        encouragementMessage.classList.add('show');
        playSound('levelup');
        createParticles(canvas.width/2, canvas.height/2, '#ff6b6b');
      } else if (score % 10 === 0 && milestoneMessages[score]) {
        showEncouragement(true, score);
      } else if (score % 5 === 0 && score % 10 !== 0) {
        showEncouragement(false);
      }
    }
    if (birdCollision(pipe)) { loseLife(); }
  });
  pipes = pipes.filter(pipe => pipe.x + PIPE_WIDTH > 0);
}

function birdCollision(pipe) {
  const tolerance = 15;
  const birdRight = BIRD_X + BIRD_SIZE - tolerance;
  const birdLeft = BIRD_X + tolerance;
  const birdTop = birdY + tolerance;
  const birdBottom = birdY + BIRD_SIZE - tolerance;
  const pipeRight = pipe.x + PIPE_WIDTH;
  const pipeLeft = pipe.x;
  if (birdRight > pipeLeft && birdLeft < pipeRight && birdTop < pipe.topHeight) { return true; }
  if (birdRight > pipeLeft && birdLeft < pipeRight && birdBottom > pipe.topHeight + PIPE_GAP) { return true; }
  return false;
}

function loseLife() {
  lives--;
  updateLivesDisplay();
  playSound('damage');
  canvas.classList.add('damage-flash');
  setTimeout(() => canvas.classList.remove('damage-flash'), 300);
  if (tg?.HapticFeedback) { tg.HapticFeedback.notificationOccurred('error'); }
  if (lives <= 0) {
    gameOver();
  } else {
    birdY = 300; birdVelocity = 0; pipes = []; pipeTimer = 0;
    if (tg?.HapticFeedback) { tg.HapticFeedback.impactOccurred('medium'); }
  }
}

function updateLivesDisplay() {
  let hearts = '';
  for (let i = 0; i < lives; i++) { hearts += '❤️'; }
  livesDisplay.innerText = hearts;
}

function createParticles(x, y, color) {
  for (let i = 0; i < 15; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    const size = Math.random() * 8 + 4;
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';
    particle.style.background = color;
    particle.style.left = x + 'px';
    particle.style.top = y + 'px';
    const angle = (Math.random() * 360) * (Math.PI / 180);
    const distance = Math.random() * 80 + 40;
    particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
    particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
    particle.style.animationDuration = (Math.random() * 0.4 + 0.4) + 's';
    document.body.appendChild(particle);
    setTimeout(() => particle.remove(), 800);
  }
}

function gameLoop() {
  if (!gameRunning) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  updateBird();
  updatePipes();
  drawPipes();
  drawBird();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  initAudio();
  menuScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
  score = 0; lives = MAX_LIVES;
  birdY = 300; birdVelocity = 0;
  birdFrame = 0; birdFrameCount = 0;
  pipes = []; pipeTimer = 0;
  PIPE_SPEED = BASE_PIPE_SPEED;
  gameRunning = true;
  scoreDisplay.innerText = score;
  updateLivesDisplay();
  updateDifficultyMode();
  gameLoop();
}

function quickRestart() {
  if (!gameRunning && !gameOverScreen.classList.contains('hidden')) { startGame(); }
  else if (gameRunning) { startGame(); }
}

function gameOver() {
  gameRunning = false;
  playSound('gameover');
  if (score > bestScore) { bestScore = score; localStorage.setItem('flappy_best_score', bestScore); }
  finalScoreEl.innerText = score;
  bestScoreFinalEl.innerText = bestScore;
  gameOverScreen.classList.remove('hidden');
  saveScore(score);
  if (tg?.HapticFeedback) { tg.HapticFeedback.notificationOccurred('error'); }
}

function jump() {
  if (!gameRunning) return;
  birdVelocity = JUMP_STRENGTH;
  playSound('jump');
  createParticles(BIRD_X + BIRD_SIZE/2, birdY + BIRD_SIZE/2, '#ffffff');
  if (tg?.HapticFeedback) { tg.HapticFeedback.impactOccurred('light'); }
}

canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (gameRunning) jump();
    else if (!menuScreen.classList.contains('hidden')) startGame();
    else if (!gameOverScreen.classList.contains('hidden')) startGame();
  }
});

function saveScore(score) {
  const scores = getScores();
  scores.push({ name: playerName, score: score, date: new Date().toISOString() });
  scores.sort((a, b) => b.score - a.score);
  scores.splice(50);
  localStorage.setItem('flappy_scores', JSON.stringify(scores));
}
function getScores() { const s = localStorage.getItem('flappy_scores'); return s ? JSON.parse(s) : []; }

function showLeaderboard() {
  const scores = getScores();
  leaderboardList.innerHTML = '';
  if (scores.length === 0) { leaderboardEmpty.style.display = 'block'; }
  else {
    leaderboardEmpty.style.display = 'none';
    scores.slice(0, 10).forEach((entry, idx) => {
      const li = document.createElement('div');
      li.className = 'leaderboard-item';
      if (idx === 0) li.classList.add('top-1');
      else if (idx === 1) li.classList.add('top-2');
      else if (idx === 2) li.classList.add('top-3');
      const emoji = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '';
      li.innerHTML = `<span>${emoji} #${idx+1} ${entry.name}</span><span style="color:#ffdd59">${entry.score} pts</span>`;
      leaderboardList.appendChild(li);
    });
  }
  leaderboardScreen.classList.remove('hidden');
}
function hideLeaderboard() { leaderboardScreen.classList.add('hidden'); }
function showMenu() { gameOverScreen.classList.add('hidden'); menuScreen.classList.remove('hidden'); bestScoreEl.innerText = bestScore; }

// 📤 COMPARTIR - URL ACTUALIZADA ✅
function shareScore() {
  const gameUrl = 'https://t.me/Valefor_bird_bot';
  const msg = `🐦 ¡Jugué Valefor Bird!\n\n🏆 Mi puntuación: ${score}\n❤️ Vidas: ${lives}/${MAX_LIVES}\n\n👉 ¡Intenta superarme!\n\n🔗 ${gameUrl}`;
  navigator.clipboard.writeText(msg).then(() => {
    if (tg?.showAlert) tg.showAlert('📋 ¡Copiado! Pega en Telegram');
    else alert('📋 ¡Copiado! Pega en Telegram');
  });
}

function init() {
  initPlayerName();
  bestScore = parseInt(localStorage.getItem('flappy_best_score')) || 0;
  bestScoreEl.innerText = bestScore;
  updateLivesDisplay();
  updateDifficultyMode();
  drawBackground();
  drawBird();
}
init();
</script>
