<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="frame-ancestors 'self' https://*.telegram.org https://t.me *;">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clicker Aleatorio - 80 y 90 Radio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; }
body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  height: auto;
  margin: 0;
  overflow: auto;
  user-select: none;
  position: relative;
}
h1 { margin: 10px 0; font-size: 22px; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; }
.score-board { font-size: 32px; font-weight: bold; margin: 10px 0; background: rgba(0,0,0,0.3); padding: 10px 25px; border-radius: 15px; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; }
.timer { font-size: 18px; color: #ffdd59; margin-bottom: 15px; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; }
.target { position: absolute; border-radius: 50%; border: 3px solid white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.1s; -webkit-tap-highlight-color: transparent; animation: popIn 0.3s ease-out; z-index: 30; }
.target:active { transform: scale(0.9); }
@keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
#start-btn, #restart-btn, #results-restart-btn, #leaderboard-btn, #share-score-btn { padding: 15px 40px; font-size: 18px; background: #ffdd59; border: none; border-radius: 30px; cursor: pointer; color: #333; font-weight: bold; margin-top: 10px; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: transform 0.2s; }
#start-btn:hover, #restart-btn:hover, #results-restart-btn:hover, #leaderboard-btn:hover, #share-score-btn:hover { transform: scale(1.05); }
.hidden { display: none !important; }
.target.color-1 { background: #ff6b6b; }
.target.color-2 { background: #4ecdc4; }
.target.color-3 { background: #ffe66d; }
.target.color-4 { background: #95e1d3; }
.target.color-5 { background: #f38181; }
#sound-btn { position: fixed; top: 15px; right: 15px; width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; background: rgba(0,0,0,0.3); color: white; font-size: 24px; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
#sound-btn:hover { background: rgba(0,0,0,0.5); transform: scale(1.1); }
.radio-container { position: fixed; top: 15px; left: 15px; display: flex; flex-direction: column; align-items: center; z-index: 100; gap: 8px; }
#radio-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; background: rgba(0,0,0,0.3); cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; transition: all 0.3s; position: relative; overflow: hidden; }
#radio-btn:hover { background: rgba(0,0,0,0.5); transform: scale(1.1); border-color: #ffdd59; }
.radio-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; transition: opacity 0.3s; }
.radio-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: rgba(0,0,0,0.8); color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
#radio-btn.loading .radio-overlay { opacity: 1; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
#radio-btn.playing { border-color: #ff6b6b; box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4); } 50% { box-shadow: 0 0 0 12px rgba(255, 107, 107, 0); } }
.radio-label { font-size: 11px; color: white; text-align: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); white-space: nowrap; font-weight: 500; max-width: 100px; line-height: 1.2; }
@media (max-width: 360px) { .radio-label { font-size: 10px; max-width: 80px; } }
.floating-message { position: absolute; font-size: 24px; font-weight: bold; pointer-events: none; z-index: 50; animation: floatUp 1s ease-out forwards; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
@keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-80px) scale(1.2); opacity: 0; } }
.msg-positive { color: #4ecdc4; }
.msg-negative { color: #ff6b6b; }
.msg-milestone { color: #ffdd59; font-size: 32px; }
.msg-warning { color: #ff9f43; }
.particle { position: absolute; border-radius: 50%; pointer-events: none; z-index: 40; animation: particleExplode 0.6s ease-out forwards; }
@keyframes particleExplode { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
#results-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.90); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
#results-screen.visible { opacity: 1; pointer-events: all; }
.results-content { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); max-width: 85%; animation: slideUp 0.4s ease-out; position: relative; overflow: hidden; border: 3px solid rgba(255,255,255,0.3); }
@keyframes slideUp { 0% { transform: translateY(50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
.results-emoji { font-size: 64px; margin-bottom: 10px; animation: bounce 1s infinite; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.results-title { font-size: 24px; margin-bottom: 15px; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); font-weight: bold; }
.results-score { font-size: 56px; font-weight: bold; margin: 20px 0; color: #ffffff; text-shadow: 3px 3px 6px rgba(0,0,0,0.8); }
.results-message { font-size: 20px; margin-bottom: 25px; font-weight: bold; min-height: 30px; padding: 15px 25px; border-radius: 10px; background: rgba(0, 0, 0, 0.6); color: #ffffff !important; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); display: inline-block; }
.results-stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; font-size: 14px; color: #ffffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
.stat-item { background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); }
.player-name-display { font-size: 16px; color: #ffdd59; margin-bottom: 10px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); pointer-events: none; }
#share-score-btn { padding: 12px 30px; font-size: 16px; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; border-radius: 25px; cursor: pointer; margin-top: 15px; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
#share-score-btn:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }
#share-score-btn.copied { background: #4ecdc4; border-color: #4ecdc4; }
#leaderboard-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding-top: 60px; }
#leaderboard-screen.visible { opacity: 1; pointer-events: all; }
.leaderboard-content { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 70vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 3px solid rgba(255,255,255,0.3); }
.leaderboard-title { font-size: 28px; text-align: center; margin-bottom: 20px; color: #ffdd59; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
.leaderboard-list { list-style: none; padding: 0; margin: 0; }
.leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; margin-bottom: 8px; background: rgba(0,0,0,0.3); border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); transition: transform 0.2s; }
.leaderboard-item:hover { transform: scale(1.02); }
.leaderboard-item.top-1 { background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%); border: 2px solid #ffffff; }
.leaderboard-item.top-2 { background: linear-gradient(135deg, #c0c0c0 0%, #a0a0a0 100%); border: 2px solid #ffffff; }
.leaderboard-item.top-3 { background: linear-gradient(135deg, #cd7f32 0%, #b87333 100%); border: 2px solid #ffffff; }
.leaderboard-rank { font-size: 20px; font-weight: bold; width: 40px; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
.leaderboard-name { flex: 1; font-size: 16px; color: #ffffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); padding: 0 10px; }
.leaderboard-score { font-size: 18px; font-weight: bold; color: #ffdd59; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
.leaderboard-empty { text-align: center; color: #ffffff; padding: 30px; font-size: 18px; }
#close-leaderboard-btn { margin-top: 20px; padding: 12px 30px; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; border-radius: 25px; font-size: 16px; cursor: pointer; transition: all 0.3s; }
#close-leaderboard-btn:hover { background: rgba(255,255,255,0.4); }
#name-input-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 400; }
.name-input-content { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); max-width: 90%; border: 3px solid rgba(255,255,255,0.3); }
.name-input-title { font-size: 24px; margin-bottom: 20px; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
#player-name-input { width: 100%; padding: 15px; font-size: 18px; border: 2px solid rgba(255,255,255,0.5); border-radius: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.3); color: white; text-align: center; }
#player-name-input::placeholder { color: rgba(255,255,255,0.5); }
#save-name-btn { padding: 15px 40px; font-size: 18px; background: #ffdd59; border: none; border-radius: 30px; cursor: pointer; color: #333; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
.level-legendary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%) !important; }
.level-epic { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%) !important; }
.level-great { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%) !important; }
.level-good { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
.level-beginner { background: linear-gradient(135deg, #5a5a5a 0%, #3a3a3a 100%) !important; }
</style>
</head>
<body>
<!-- 📻 AUDIO RADIO -->
<audio id="radio-audio" preload="none" crossorigin="anonymous">
  <source src="https://stream.zeno.fm/ndhkmuknva0uv" type="audio/mpeg">
</audio>

<!-- 📝 PANTALLA NOMBRE -->
<div id="name-input-screen">
  <div class="name-input-content">
    <div class="name-input-title">👤 Ingresa tu Nombre</div>
    <input type="text" id="player-name-input" placeholder="Tu nombre..." maxlength="20">
    <button id="save-name-btn" onclick="savePlayerName()">▶️ Comenzar</button>
  </div>
</div>

<!-- 📻 RADIO -->
<div class="radio-container">
  <button id="radio-btn" onclick="toggleRadio()">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgqvizWNyyqSmA1V6SOmns4wLWw849mHxRjABDTG0o2iyoHbsDPc9nc0rQW4iW6bfpIQLNn6pOgPlWsygdsuMury7g3ss1yJwDOJY1kHXyQwi53Lp9cyIMduU3NzUVaeme8n6V3_yhhGMEIb5XrCmuBejA6FoE5Uyt9ZmNYAqCxqhFmJf2wA9DpTtz9xg/s640/s80y90.png" alt="80 y 90 Radio" class="radio-img">
    <div class="radio-overlay">🔄</div>
  </button>
  <span class="radio-label">80 y 90 Radio</span>
</div>

<!-- 🔊 SONIDO -->
<button id="sound-btn" onclick="toggleSound()">🔊</button>

<!-- 🎮 JUEGO -->
<h1>🎯 Clicker Aleatorio</h1>
<div class="timer" id="timer">Tiempo: 30s</div>
<div class="score-board">Puntos: <span id="score">0</span></div>
<div class="player-name-display" id="player-name-display">Jugador: --</div>
<button id="start-btn" onclick="startGame()">▶️ Comenzar Juego</button>
<button id="leaderboard-btn" onclick="showLeaderboard()">🏆 Ver Ranking</button>
<button id="restart-btn" class="hidden" onclick="startGame()">🔄 Jugar de Nuevo</button>
<div id="game-area"></div>

<!-- 🏆 RESULTADOS -->
<div id="results-screen">
  <div class="results-content">
    <div class="results-emoji" id="results-emoji">🏆</div>
    <div class="results-title">¡Juego Terminado!</div>
    <div class="results-score" id="final-score">0</div>
    <div class="results-message" id="results-message"></div>
    <div class="results-stats">
      <div class="stat-item">⏱️ 30s</div>
      <div class="stat-item" id="accuracy-stat">🎯 Precisión: --</div>
    </div>
    <button id="results-restart-btn" onclick="startGame()">🔄 Jugar Otra Vez</button>
    <button id="results-leaderboard-btn" onclick="showLeaderboard()">🏆 Ranking</button>
    <button id="share-score-btn" onclick="shareScore()">📤 Compartir</button>
  </div>
</div>

<!-- 🏆 LEADERBOARD -->
<div id="leaderboard-screen">
  <div class="leaderboard-content">
    <div class="leaderboard-title">🏆 Top Jugadores</div>
    <ul class="leaderboard-list" id="leaderboard-list"></ul>
    <div class="leaderboard-empty hidden" id="leaderboard-empty">¡No hay puntuaciones aún!</div>
  </div>
  <button id="close-leaderboard-btn" onclick="hideLeaderboard()">Cerrar</button>
</div>

<script>
// ✅ INICIALIZACIÓN COMPATIBLE CON INLINE + WEB APP
const tg = window.Telegram?.WebApp || null;

function initTelegram() {
  if (!tg) return;
  tg.ready();
  
  // Detectar si es Inline Game (?game=) o Web App (Menu Button)
  const isInlineGame = window.location.href.includes('?game=');
  
  if (isInlineGame) {
    // En Inline: NO expandir, ajustar estilos para iframe
    document.body.style.overflow = 'auto';
    document.body.style.height = 'auto';
    document.documentElement.style.overflow = 'auto';
    if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
  } else {
    // En Web App: expandir normalmente
    if (tg.expand) tg.expand();
  }
  
  if (tg.setHeaderColor) tg.setHeaderColor('#667eea');
  if (tg.setBackgroundColor) tg.setBackgroundColor('#764ba2');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initTelegram);
} else {
  initTelegram();
}

// 📻 VARIABLES DE RADIO
const radioAudio = document.getElementById('radio-audio');
const radioBtn = document.getElementById('radio-btn');
const radioOverlay = document.getElementById('radio-overlay');
let radioEnabled = false, radioLoading = false;

// 🎮 VARIABLES DEL JUEGO
let playerName = '', score = 0, timeLeft = 30, gameInterval, isPlaying = false, currentTarget = null, soundEnabled = true, audioContext = null, targetsSpawned = 0, comboCount = 0, milestonesShown = [];

// 🔗 DOM
const scoreEl = document.getElementById('score'), timerEl = document.getElementById('timer'), startBtn = document.getElementById('start-btn'), restartBtn = document.getElementById('restart-btn'), leaderboardBtn = document.getElementById('leaderboard-btn'), gameArea = document.getElementById('game-area'), soundBtn = document.getElementById('sound-btn'), playerNameDisplay = document.getElementById('player-name-display'), resultsScreen = document.getElementById('results-screen'), finalScoreEl = document.getElementById('final-score'), resultsMessageEl = document.getElementById('results-message'), resultsEmojiEl = document.getElementById('results-emoji'), accuracyStatEl = document.getElementById('accuracy-stat'), shareScoreBtn = document.getElementById('share-score-btn'), leaderboardScreen = document.getElementById('leaderboard-screen'), leaderboardList = document.getElementById('leaderboard-list'), leaderboardEmpty = document.getElementById('leaderboard-empty'), nameInputScreen = document.getElementById('name-input-screen'), playerNameInput = document.getElementById('player-name-input');

// ⚙️ CONFIG
const sizes = [60, 80, 100, 120], targetLifetime = 3000, particleColors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181', '#ffffff'];

// 📻 RADIO
function toggleRadio() {
  if (radioLoading) return;
  radioEnabled = !radioEnabled;
  if (radioEnabled) {
    radioLoading = true; radioBtn.classList.add('loading'); radioAudio.pause(); radioAudio.currentTime = 0;
    radioAudio.play().then(() => { radioLoading = false; radioBtn.classList.remove('loading'); radioBtn.classList.add('playing'); })
    .catch(() => { radioEnabled = false; radioLoading = false; radioBtn.classList.remove('loading'); alert('❌ No se pudo conectar a la radio.'); });
  } else { radioAudio.pause(); radioBtn.classList.remove('playing', 'loading'); }
}

// 📤 COMPARTIR - URL ACTUALIZADA ✅
function shareScore() {
  const gameUrl = 'https://t.me/Valefor_bird_bot';
  const message = `🎯 ¡Jugué Clicker Aleatorio!\n🏆 Mi puntuación: ${score} puntos\n⏱️ Tiempo: 30 segundos\n🎮 ¿Puedes superarme?\n👉 Juega aquí: ${gameUrl}`;
  navigator.clipboard.writeText(message).then(() => {
    const originalText = shareScoreBtn.innerHTML;
    shareScoreBtn.innerHTML = '✅ ¡Copiado!'; shareScoreBtn.classList.add('copied');
    setTimeout(() => { shareScoreBtn.innerHTML = originalText; shareScoreBtn.classList.remove('copied'); }, 3000);
    alert('📋 Puntuación copiada. ¡Pégala en Telegram!');
  });
}

// 👤 NOMBRE
function initPlayerName() {
  const saved = localStorage.getItem('clicker_player_name');
  if (saved) { playerName = saved; playerNameDisplay.innerText = 'Jugador: ' + playerName; nameInputScreen.classList.add('hidden'); }
  else { nameInputScreen.classList.remove('hidden'); }
}
function savePlayerName() {
  const name = playerNameInput.value.trim();
  if (name) { playerName = name; playerNameDisplay.innerText = 'Jugador: ' + playerName; localStorage.setItem('clicker_player_name', name); nameInputScreen.classList.add('hidden'); }
  else { alert('Ingresa un nombre'); }
}

// 🏆 PUNTUACIONES
function saveScore(s) {
  const scores = JSON.parse(localStorage.getItem('clicker_scores') || '[]');
  scores.push({ name: playerName, score: s });
  scores.sort((a, b) => b.score - a.score); scores.splice(50);
  localStorage.setItem('clicker_scores', JSON.stringify(scores));
}
function showLeaderboard() {
  const scores = JSON.parse(localStorage.getItem('clicker_scores') || '[]');
  leaderboardList.innerHTML = '';
  if (!scores.length) { leaderboardEmpty.classList.remove('hidden'); }
  else {
    leaderboardEmpty.classList.add('hidden');
    scores.forEach((e, i) => {
      const li = document.createElement('li');
      li.className = 'leaderboard-item' + (i < 3 ? ' top-' + (i+1) : '');
      li.innerHTML = `<span>#${i+1} ${e.name}</span><span>${e.score} pts</span>`;
      leaderboardList.appendChild(li);
    });
  }
  leaderboardScreen.classList.add('visible');
}
function hideLeaderboard() { leaderboardScreen.classList.remove('visible'); }

// ✨ PARTÍCULAS
function createParticles(x, y, count = 12) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    const size = Math.random() * 6 + 4;
    p.style.cssText = `width:${size}px;height:${size}px;background:${particleColors[Math.floor(Math.random()*particleColors.length)]};left:${x}px;top:${y}px;`;
    const angle = Math.random() * Math.PI * 2, dist = Math.random() * 80 + 40;
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    gameArea.appendChild(p); setTimeout(() => p.remove(), 600);
  }
}

// 💬 MENSAJES
function showFloatingMessage(x, y, text, type = 'positive') {
  const msg = document.createElement('div');
  msg.className = `floating-message msg-${type}`;
  msg.innerText = text; msg.style.left = x + 'px'; msg.style.top = y + 'px';
  gameArea.appendChild(msg); setTimeout(() => msg.remove(), 1000);
}

// 🔊 AUDIO
function initAudio() { if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)(); }
function playSound() {
  if (!soundEnabled || !audioContext) return;
  const osc = audioContext.createOscillator(), gain = audioContext.createGain();
  osc.connect(gain); gain.connect(audioContext.destination);
  osc.frequency.value = 600; gain.gain.setValueAtTime(0.3, audioContext.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
  osc.start(); osc.stop(audioContext.currentTime + 0.1);
}
function toggleSound() { soundEnabled = !soundEnabled; soundBtn.innerText = soundEnabled ? '🔊' : '🔇'; }

// 🎯 JUEGO
function createTarget() {
  if (!isPlaying) return;
  if (currentTarget) { currentTarget.remove(); }
  const size = sizes[Math.floor(Math.random() * sizes.length)];
  const x = Math.floor(Math.random() * (window.innerWidth - size));
  const y = Math.floor(Math.random() * (window.innerHeight - size - 200)) + 200;
  const target = document.createElement('div');
  target.className = `target color-${Math.floor(Math.random() * 5) + 1}`;
  target.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;font-size:${size/3}px;`;
  target.innerHTML = '🎯';
  target.onclick = e => { e.stopPropagation(); score++; scoreEl.innerText = score; playSound(); createParticles(e.clientX, e.clientY); target.remove(); currentTarget = null; setTimeout(createTarget, 100); };
  gameArea.appendChild(target); currentTarget = target; targetsSpawned++;
  setTimeout(() => { if (currentTarget === target) { target.remove(); currentTarget = null; } }, targetLifetime);
}

function startGame() {
  initAudio(); resultsScreen.classList.remove('visible');
  score = 0; timeLeft = 30; targetsSpawned = 0; isPlaying = true;
  scoreEl.innerText = 0; timerEl.innerText = '⏱️ Tiempo: 30s';
  startBtn.classList.add('hidden'); leaderboardBtn.classList.add('hidden'); restartBtn.classList.add('hidden');
  gameArea.innerHTML = ''; currentTarget = null; playSound(); createTarget();
  gameInterval = setInterval(() => { timeLeft--; timerEl.innerText = '⏱️ Tiempo: ' + timeLeft + 's'; if (timeLeft <= 0) endGame(); }, 1000);
}
function endGame() {
  clearInterval(gameInterval); isPlaying = false;
  if (currentTarget) { currentTarget.remove(); currentTarget = null; }
  gameArea.innerHTML = ''; finalScoreEl.innerText = score;
  resultsMessageEl.innerText = score >= 20 ? '¡Excelente!' : '¡Sigue practicando!';
  saveScore(score); resultsScreen.classList.add('visible');
}

// ✅ INICIALIZAR
initPlayerName();
</script>
